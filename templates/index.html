<!DOCTYPE html>
<html>
<head>
    <title>Customer Support</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-wrapper {
            width: 420px;
            height: 620px;
            background: #fff;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        /* HEADER */
        .chat-header {
            background: #1f2937;
            color: white;
            padding: 14px;
            display: flex;
            align-items: center;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #2563eb;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 10px;
            font-weight: bold;
        }

        .header-text {
            display: flex;
            flex-direction: column;
        }

        .status {
            font-size: 12px;
            color: #9ca3af;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        /* CHAT AREA */
        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f9fafb;
        }

        .msg-row {
            display: flex;
            margin: 10px 0;
        }

        .user {
            justify-content: flex-end;
        }

        .bot {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.4;
        }

        .user .bubble {
            background: #2563eb;
            color: white;
        }

        .bot .bubble {
            background: #e5e7eb;
            color: #111827;
        }

        .time {
            font-size: 10px;
            color: #6b7280;
            margin-top: 4px;
        }

        /* TYPING */
        .typing {
            font-size: 12px;
            color: #6b7280;
            padding-left: 15px;
            display: none;
        }

        /* INPUT */
        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #e5e7eb;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #d1d5db;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 16px;
            border: none;
            border-radius: 20px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

<div class="chat-wrapper">

    <div class="chat-header">
        <div class="avatar">CS</div>
        <div class="header-text">
            <div>Customer Support</div>
            <div class="status">
                <span class="status-dot"></span>Online • Replies instantly
            </div>
        </div>
    </div>

    <div class="chat-box" id="chat"></div>

    <div class="typing" id="typing">Agent is typing...</div>

    <div class="input-area">
        <input type="text" id="msg" placeholder="Describe your issue..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
function getTime() {
    let d = new Date();
    return d.getHours() + ":" + String(d.getMinutes()).padStart(2,'0');
}

function addMessage(text, type) {
    let chat = document.getElementById("chat");

    let row = document.createElement("div");
    row.className = "msg-row " + type;

    let wrapper = document.createElement("div");

    let bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = text;

    let time = document.createElement("div");
    time.className = "time";
    time.innerText = getTime();

    wrapper.appendChild(bubble);
    wrapper.appendChild(time);

    row.appendChild(wrapper);
    chat.appendChild(row);

    chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {
    let input = document.getElementById("msg");
    let msg = input.value.trim();

    if (msg === "") return;

    addMessage(msg, "user");
    input.value = "";

    document.getElementById("typing").style.display = "block";

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("typing").style.display = "none";
        addMessage(data.response, "bot");
    })
    .catch(() => {
        document.getElementById("typing").style.display = "none";
        addMessage("We are facing technical issues. Please try again later.", "bot");
    });
}

document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});

addMessage("Hello! Welcome to Customer Support. How can I assist you today?", "bot");
</script>

</body>
</html>
